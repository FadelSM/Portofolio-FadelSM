<!DOCTYPE html>
<html lang="id">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KG8693GC');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Fadel Shafwan Maliki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-900: #0f172a; --slate-800: #1e293b; --slate-700: #334155;
            --slate-400: #94a3b8; --indigo-500: #6366f1; --gold-color: #fbbf24;
            --silver-color: #cbd5e1; --coming-color: #f43f5e; --text-main: #f1f5f9;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        body {
            background-color: var(--slate-900); color: var(--text-main);
            font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh;
        }

        aside {
            width: 280px; background: linear-gradient(180deg, var(--slate-800) 0%, var(--slate-900) 100%);
            border-right: 1px solid var(--slate-700); padding: 40px 24px; display: flex; flex-direction: column; flex-shrink: 0;
        }

        .dev-avatar { 
            width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 15px; overflow: hidden;
            border: 2px solid var(--indigo-500); padding: 3px;
        }
        .dev-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }

        .time-box {
            background: rgba(0,0,0,0.2); border: 1px solid var(--slate-700);
            border-radius: 12px; padding: 12px; margin-top: 20px;
        }
        .time-label { font-size: 0.6rem; color: var(--slate-400); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .time-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--indigo-500); }

        main { flex: 1; padding: 60px; overflow-y: auto; box-sizing: border-box; }
        .search-input {
            width: 100%; max-width: 400px; background: var(--slate-800); border: 1px solid var(--slate-700);
            padding: 12px 16px; border-radius: 12px; color: #fff; outline: none; margin-bottom: 30px;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--slate-800); padding: 24px; border-radius: 16px; border: 1px solid var(--slate-700); text-align: center; }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: var(--indigo-500); }

        .table-container { background: var(--slate-800); border-radius: 16px; border: 1px solid var(--slate-700); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #1e293b; padding: 20px; font-size: 0.75rem; color: var(--slate-400); text-transform: uppercase; border-bottom: 1px solid var(--slate-700); }
        td { padding: 18px 20px; border-bottom: 1px solid var(--slate-700); font-size: 0.9rem; }

        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
        .badge-gold { background: rgba(251, 191, 36, 0.15); color: var(--gold-color); border: 1px solid rgba(251, 191, 36, 0.3); }
        .badge-silver { background: rgba(203, 213, 225, 0.15); color: var(--silver-color); border: 1px solid rgba(203, 213, 225, 0.3); }
        .badge-pending { background: rgba(244, 63, 94, 0.1); color: var(--coming-color); border: 1px solid rgba(244, 63, 94, 0.2); }

        .countdown-text { 
            display: block; font-family: 'JetBrains Mono', monospace; 
            font-size: 0.7rem; color: var(--coming-color); margin-top: 4px;
        }

        .comp-link { color: #fff; text-decoration: none; font-weight: 600; }
        .comp-link:hover { color: var(--indigo-500); }

        @media (max-width: 768px) { body { flex-direction: column; } aside { width: 100%; } main { padding: 30px 20px; } }
    </style>
</head>
<body>
    <aside>
        <div class="dev-profile" style="text-align:center;">
            <div class="dev-avatar"><img src="https://files.catbox.moe/cwu6d7.png" alt="Fadel"></div>
            <h3 style="margin:0; font-size:1.1rem;">Fadel Shafwan Maliki</h3>
            <p style="color:var(--indigo-500); font-size:0.8rem; font-weight:600; margin:5px 0 20px;">Full-Stack Developer</p>
        </div>
        <div class="time-box">
            <span class="time-label">Waktu Lokal Anda</span>
            <span class="time-value" id="sidebar-clock">00:00:00</span>
            <span style="display:block; font-size:0.6rem; color:var(--slate-400); margin-top:4px;" id="user-tz">Detecting...</span>
        </div>
    </aside>

    <main>
        <header>
            <h1>Achievement Repository</h1>
            <p style="color:var(--slate-400)">Database 20 kompetisi & prestasi tahun 2026.</p>
        </header>

        <input type="text" id="search-bar" class="search-input" placeholder="Cari lomba atau bidang...">

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="count-gold">0</div><div class="stat-label">Medali Emas</div></div>
            <div class="stat-card"><div class="stat-value" id="count-total">20</div><div class="stat-label">Total Lomba</div></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 160px;">Tanggal / Hitung Mundur</th>
                        <th>Nama Lomba</th>
                        <th>Penyelenggara</th>
                        <th>Kategori</th>
                        <th>Hasil</th>
                    </tr>
                </thead>
                <tbody id="render-target"></tbody>
            </table>
        </div>
    </main>

    <script>
        // Database 20 Lomba (Sesuai List Terakhir)
        const repository = [
            { date: "2026-03-01T08:00:00", name: "RSCI 2026", host: "Fosnas", field: "Informatika", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/1eztmI8LVAH0UOV_WnVB1RjkLmjBTwiT1/view" },
            { date: "2026-03-15T08:00:00", name: "SSN Ekonomi", host: "Gemanesia", field: "Ekonomi", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/1LMRLct-DOdGwMh6F1bHQMS-1yfU02pQr/view" },
            { date: "2026-03-15T08:00:00", name: "SSN PPKN", host: "Gemanesia", field: "PPKN", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/1IoBjF9ho5bU-zgQRFivI_5ZNVGPF6R6I/view" },
            { date: "2026-03-15T08:00:00", name: "SSN Informatika", host: "Gemanesia", field: "Informatika", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/1Hd72RWn1hA8_EhKtoeVd5B4YK8XIt4w2/view" },
            { date: "2026-03-29T08:00:00", name: "NSC PPKN", host: "Puskanas", field: "PPKN", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/1Dwf8cW6rfS8C3hk5KHl85QThNOruQAlH/view" },
            { date: "2026-03-29T08:00:00", name: "NSC Informatika", host: "Puskanas", field: "Informatika", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/1OJSE8bk_muhpFrXfmNyrk-kWHnOx8X6F/view" },
            { date: "2026-03-29T08:00:00", name: "OSMI Ekonomi", host: "Muda Sains", field: "Ekonomi", result: "Medali Perak", link: "https://drive.google.com/file/d/1-VxeLUvyW2mh7JPHzt27TXE7fY9GFbKW/view" },
            { date: "2026-03-29T08:00:00", name: "OSMI Informatika", host: "Muda Sains", field: "Informatika", result: "Medali Emas (A+)", link: "https://drive.google.com/file/d/19BUdb6SMu5DhVRepPCQzS3q5NX5AH_bh/view" },
            { date: "2026-04-05T08:00:00", name: "FSC B. Indonesia", host: "Yaspresnas", field: "Bahasa Indonesia", result: "Medali Perak", link: "#" },
            { date: "2026-04-05T08:00:00", name: "FSC B. Inggris", host: "Yaspresnas", field: "Bahasa Inggris", result: "Medali Emas (A+)", link: "#" },
            { date: "2026-04-05T08:00:00", name: "FSC Matematika", host: "Yaspresnas", field: "Matematika", result: "Medali Perak", link: "#" },
            { date: "2026-04-05T08:00:00", name: "FSC Kimia", host: "Yaspresnas", field: "Kimia", result: "Medali Perak", link: "#" },
            { date: "2026-04-05T08:00:00", name: "FSC Informatika", host: "Yaspresnas", field: "Informatika", result: "Medali Perak", link: "#" },
            // COMING SOON SECTION
            { date: "2026-04-19T10:00:00", name: "PSPI Informatika", host: "Gemanesia", field: "Informatika", result: "Coming Soon", link: "#" },
            { date: "2026-04-19T13:00:00", name: "OSTN Biologi", host: "Sentral Olimpiade", field: "Biologi", result: "Coming Soon", link: "#" },
            { date: "2026-04-19T15:00:00", name: "OSTN PPKN", host: "Sentral Olimpiade", field: "PPKN", result: "Coming Soon", link: "#" },
            { date: "2026-04-26T08:00:00", name: "KSN Ekonomi", host: "Puskanas", field: "Ekonomi", result: "Coming Soon", link: "#" },
            { date: "2026-04-26T13:00:00", name: "KSN Informatika", host: "Puskanas", field: "Informatika", result: "Coming Soon", link: "#" },
            { date: "2026-05-24T08:00:00", name: "SEON Geografi", host: "Sentral Olimpiade", field: "Geografi", result: "Coming Soon", link: "#" },
            { date: "2026-05-24T13:00:00", name: "SEON Informatika", host: "Sentral Olimpiade", field: "Informatika", result: "Coming Soon", link: "#" }
        ];

        function updateDisplay() {
            const now = new Date().getTime();
            document.getElementById('sidebar-clock').innerText = new Date().toLocaleTimeString('en-GB');

            document.querySelectorAll('.timer-row').forEach(cell => {
                const targetDate = new Date(cell.dataset.date).getTime();
                const diff = targetDate - now;
                const display = cell.querySelector('.countdown-text');

                if (diff > 0 && cell.dataset.status === "Coming Soon") {
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    display.innerText = `T-Minus: ${d}d ${h}h ${m}m ${s}s`;
                } else if (cell.dataset.status === "Coming Soon") {
                    display.innerText = "Berlangsung / Selesai";
                }
            });
        }

        function renderTable(data) {
            const target = document.getElementById('render-target');
            target.innerHTML = "";
            data.forEach(item => {
                const isComing = item.result === "Coming Soon";
                const d = new Date(item.date);
                const dateString = d.toLocaleDateString('id-ID', { day:'2-digit', month:'short' });
                
                let badgeClass = "badge-pending";
                if (item.result.toLowerCase().includes("emas")) badgeClass = "badge-gold";
                else if (item.result.toLowerCase().includes("perak")) badgeClass = "badge-silver";

                target.innerHTML += `
                    <tr>
                        <td class="timer-row" data-date="${item.date}" data-status="${item.result}">
                            <span style="font-weight:700">${dateString}</span>
                            ${isComing ? `<span class="countdown-text">Menghitung...</span>` : `<span class="countdown-text" style="color:var(--slate-600)">Selesai</span>`}
                        </td>
                        <td>${item.link !== "#" ? `<a href="${item.link}" class="comp-link">${item.name}</a>` : item.name}</td>
                        <td>${item.host}</td>
                        <td>${item.field}</td>
                        <td><span class="badge ${badgeClass}">${item.result}</span></td>
                    </tr>`;
            });
        }

        // Init
        document.getElementById('user-tz').innerText = Intl.DateTimeFormat().resolvedOptions().timeZone;
        renderTable(repository);
        document.getElementById('count-gold').innerText = repository.filter(i => i.result.includes("Emas")).length;
        
        setInterval(updateDisplay, 1000);
        updateDisplay();

        document.getElementById('search-bar').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = repository.filter(i => i.name.toLowerCase().includes(val) || i.field.toLowerCase().includes(val));
            renderTable(filtered);
        });
    </script>
</body>
</html>
