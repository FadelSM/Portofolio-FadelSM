<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossier Prestasi | Fadel Shafwan Maliki</title>
    <style>
        /* Desain ini menggunakan konsep Industrial-Cyber yang sangat spesifik */
        :root {
            --neon-blue: #00f2ff;
            --dark-space: #05070a;
            --surface: #0d1117;
            --border: #1f2937;
            --text-main: #e5e7eb;
        }

        body {
            background-color: var(--dark-space);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'Fira Code', monospace; /* Font programming agar terlihat otentik */
            margin: 0;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .main-frame {
            max-width: 1100px;
            margin: 0 auto;
            border: 1px solid var(--border);
            background: var(--surface);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Dekorasi sudut agar terlihat seperti sistem militer/keamanan */
        .main-frame::before {
            content: "ID: FADEL_SHAFWAN_MALIKI // CLASS: X.4";
            position: absolute;
            top: -25px;
            left: 10px;
            font-size: 10px;
            color: var(--neon-blue);
            letter-spacing: 2px;
        }

        header {
            padding: 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: #fff;
            text-shadow: 2px 2px 0px var(--neon-blue);
        }

        .profile-status {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            font-size: 12px;
        }

        .status-box {
            border-left: 2px solid var(--neon-blue);
            padding-left: 10px;
        }

        .status-box label { color: #6b7280; display: block; margin-bottom: 3px; }

        /* Grid Prestasi yang Unik */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1px; /* Membuat garis antar kotak */
            background-color: var(--border);
        }

        .ach-card {
            background: var(--surface);
            padding: 25px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ach-card:hover {
            background: #111827;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .ach-tag {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 8px;
            border: 1px solid;
            width: fit-content;
            margin-bottom: 15px;
        }

        .tag-gold { color: #ffd700; border-color: #ffd700; }
        .tag-silver { color: #9ca3af; border-color: #9ca3af; }
        .tag-process { color: #3b82f6; border-color: #3b82f6; }

        .ach-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            line-height: 1.3;
        }

        .ach-card p {
            margin: 0;
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .cert-link {
            margin-top: 20px;
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .cert-link:hover { gap: 10px; }

        .footer-bar {
            padding: 15px 40px;
            font-size: 10px;
            color: #4b5563;
            text-align: right;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            header { padding: 20px; }
            .title-block h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <header>
            <div class="title-block">
                <h1>Academic Archives</h1>
                <p style="color: var(--neon-blue); margin: 5px 0 0 0; font-size: 12px;">PORTFOLIO.V2 // 2026</p>
            </div>
            
            <div class="profile-status">
                <div class="status-box">
                    <label>OPERATOR</label>
                    <p style="margin:0">Fadel Shafwan Maliki</p>
                </div>
                <div class="status-box">
                    <label>INSTITUTION</label>
                    <p style="margin:0">SMAS PGRI 3 Jakarta</p>
                </div>
                <div class="status-box">
                    <label>EXTRACURRICULAR</label>
                    <p style="margin:0">Badminton (A-14)</p>
                </div>
                <div class="status-box">
                    <label>SOCIAL</label>
                    <a href="https://instagram.com/fadelshafwanmaliki" target="_blank" style="color:inherit; text-decoration:none;">@fadelshafwanmaliki</a>
                </div>
            </div>
        </header>

        <div class="achievement-grid" id="data-sink">
            </div>

        <div class="footer-bar">
            SYSTEM STATUS: SECURED // DATA VERIFIED BY RSCI & PUSKANAS // LAST UPDATE: 01-04-2026
        </div>
    </div>

    <script>
        const achievements = [
            { title: "RSCI 2026", org: "Fosnas", field: "Informatika", status: "Gold Medalist (A+)", link: "https://drive.google.com/file/d/1eztmI8LVAH0UOV_WnVB1RjkLmjBTwiT1/view?usp=drive_link", type: "gold" },
            { title: "SSN Ekonomi", org: "Gemanesia", field: "Ekonomi", status: "Gold Medal", link: "https://drive.google.com/file/d/1LMRLct-DOdGwMh6F1bHQMS-1yfU02pQr/view?usp=drive_link", type: "gold" },
            { title: "SSN PPKN", org: "Gemanesia", field: "PPKN", status: "Gold Medal", link: "https://drive.google.com/file/d/1IoBjF9ho5bU-zgQRFivI_5ZNVGPF6R6I/view?usp=drive_link", type: "gold" },
            { title: "SSN Informatika", org: "Gemanesia", field: "Informatika", status: "Gold Medal", link: "https://drive.google.com/file/d/1Hd72RWn1hA8_EhKtoeVd5B4YK8XIt4w2/view?usp=drive_link", type: "gold" },
            { title: "NSC PPKN", org: "Puskanas", field: "PPKN", status: "Gold Medal", link: "https://app.puskanas.id", type: "gold" },
            { title: "NSC Informatika", org: "Puskanas", field: "Informatika", status: "Gold Medal", link: "https://app.puskanas.id", type: "gold" },
            { title: "OSMI Ekonomi", org: "Muda Sains Nasional", field: "Ekonomi", status: "Silver Medal", link: "#", type: "silver" },
            { title: "OSMI Informatika", org: "Muda Sains Nasional", field: "Informatika", status: "Gold Medal", link: "#", type: "gold" },
            { title: "FSC B. Indonesia", org: "Yaspresnas", field: "B. Indonesia", status: "Queue: Results", link: "", type: "process" },
            { title: "FSC B. Inggris", org: "Yaspresnas", field: "B. Inggris", status: "Queue: Results", link: "", type: "process" },
            { title: "FSC Matematika", org: "Yaspresnas", field: "Matematika", status: "Queue: Results", link: "", type: "process" },
            { title: "FSC Kimia", org: "Yaspresnas", field: "Kimia", status: "Queue: Results", link: "", type: "process" },
            { title: "FSC Informatika", org: "Yaspresnas", field: "Informatika", status: "Queue: Results", link: "", type: "process" },
            { title: "GARUDA Matematika", org: "Lembaga Olimpiade", field: "Matematika", status: "Queue: Results", link: "", type: "process" },
            { title: "GARUDA Akuntansi", org: "Lembaga Olimpiade", field: "Akuntansi", status: "Queue: Results", link: "", type: "process" },
            { title: "GARUDA Geografi", org: "Lembaga Olimpiade", field: "Geografi", status: "Queue: Results", link: "", type: "process" },
            { title: "GARUDA Informatika", org: "Lembaga Olimpiade", field: "Informatika", status: "Queue: Results", link: "", type: "process" },
            { title: "Additional Entry", org: "National Level", field: "General", status: "Incoming", link: "", type: "process" }
        ];

        const container = document.getElementById('data-sink');

        achievements.forEach(item => {
            container.innerHTML += `
                <div class="ach-card">
                    <div>
                        <div class="ach-tag tag-${item.type}">${item.status.toUpperCase()}</div>
                        <h3>${item.title}</h3>
                        <p>${item.org} // ${item.field}</p>
                    </div>
                    ${item.link ? `
                        <a href="${item.link}" target="_blank" class="cert-link">
                            [ VIEW_FILE ] <span>→</span>
                        </a>
                    ` : ''}
                </div>
            `;
        });
    </script>
</body>
</html>
